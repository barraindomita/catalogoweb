<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo · Barra Indómita</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1c1c1c;
    --border: #2a2a2a;
    --gold: #c9a84c;
    --gold-dim: #8a6d30;
    --text: #e8e8e4;
    --muted: #888;
    --green: #25D366;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 90px; }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
  .brand img { height: 56px; width: auto; display: block; }
  .header-meta { text-align: right; }
  .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--gold); font-weight: 600; }
  .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .updated-tag { font-size: 0.68rem; color: var(--muted); margin-top: 4px; }
  .page-title { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase; text-align: center; padding: 8px 0 4px; border-top: 1px solid var(--border); margin-top: 12px; }

  .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  input[type="search"] {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px 10px 38px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s;
  }
  input[type="search"]:focus { border-color: var(--gold-dim); }
  input[type="search"]::placeholder { color: var(--muted); }

  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .filter-btn {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    padding: 7px 13px; border-radius: 20px; font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .filter-btn.active { background: var(--gold); border-color: var(--gold); color: #0d0d0d; font-weight: 500; }

  select {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 9px 12px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; outline: none; cursor: pointer;
  }

  /* GRID */
  main { padding: 20px 24px; }
  .result-info { font-size: 0.8rem; color: var(--muted); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }

  /* CARD */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; display: flex; flex-direction: column; gap: 10px;
    transition: border-color 0.2s, transform 0.15s; animation: fadeIn 0.3s ease both;
    cursor: pointer; user-select: none;
  }
  .card:hover { border-color: var(--gold-dim); transform: translateY(-2px); }
  .card.in-cart { border-color: var(--gold); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-name { font-size: 0.87rem; font-weight: 500; line-height: 1.4; color: var(--text); flex: 1; }
  .badge { font-size: 0.63rem; padding: 3px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; letter-spacing: 0.04em; text-transform: uppercase; flex-shrink: 0; }

  .card-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
  .price { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 600; color: var(--gold); }
  .stock-tag { font-size: 0.72rem; color: var(--muted); }
  .stock-tag.low { color: #c97b4c; }
  .stock-tag.promo { color: var(--gold); }

  /* CART CONTROLS on card */
  .card-cart { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .qty-btn {
    width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    flex-shrink: 0;
  }
  .qty-btn:hover { border-color: var(--gold); color: var(--gold); }
  .qty-display { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--gold); min-width: 20px; text-align: center; font-weight: 600; }
  .add-btn {
    flex: 1; padding: 7px 0; border-radius: 8px; border: 1px solid var(--gold-dim);
    background: transparent; color: var(--gold); font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem; cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em;
  }
  .add-btn:hover { background: var(--gold); color: #0d0d0d; }
  .add-btn.added { display: none; }

  /* FLOATING CART BAR */
  .cart-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; gap: 14px;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .cart-bar.visible { transform: translateY(0); }
  .cart-summary { flex: 1; }
  .cart-items-label { font-size: 0.75rem; color: var(--muted); }
  .cart-total { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--gold); font-weight: 600; }
  .cart-clear { background: none; border: 1px solid var(--border); color: var(--muted); padding: 9px 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
  .cart-clear:hover { border-color: #c97b4c; color: #c97b4c; }
  .cart-send {
    background: var(--green); border: none; color: #fff; padding: 10px 20px;
    border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
    font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px;
    transition: opacity 0.2s;
  }
  .cart-send:hover { opacity: 0.9; }
  .cart-send svg { flex-shrink: 0; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px 16px 0 0;
    width: 100%; max-width: 600px; padding: 28px 24px 32px;
    transform: translateY(40px); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    max-height: 85vh; overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--gold); margin-bottom: 20px; }
  .order-list { list-style: none; margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
  .order-item { display: flex; justify-content: space-between; gap: 12px; font-size: 0.88rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .order-item-name { color: var(--text); flex: 1; }
  .order-item-qty { color: var(--muted); white-space: nowrap; }
  .order-item-price { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 1rem; white-space: nowrap; }
  .order-total-row { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 500; color: var(--text); padding-top: 4px; margin-bottom: 20px; }
  .order-total-row span:last-child { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--gold); }

  .modal-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-copy {
    flex: 1; min-width: 140px; padding: 11px 16px; border-radius: 8px;
    border: 1px solid var(--gold-dim); background: transparent; color: var(--gold);
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
  }
  .btn-copy:hover { background: var(--gold); color: #0d0d0d; }
  .btn-whatsapp {
    flex: 1; min-width: 140px; padding: 11px 16px; border-radius: 8px;
    border: none; background: var(--green); color: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s;
  }
  .btn-whatsapp:hover { opacity: 0.9; }
  .btn-close { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; margin-top: 4px; transition: all 0.2s; }
  .btn-close:hover { border-color: var(--muted); color: var(--text); }

  .copied-toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--gold); color: #0d0d0d; padding: 8px 18px; border-radius: 20px;
    font-size: 0.82rem; font-weight: 500; opacity: 0; pointer-events: none;
    transition: all 0.3s; z-index: 400;
  }
  .copied-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Loading / Error / Empty */
  .loading-state { grid-column: 1/-1; text-align: center; padding: 80px 24px; }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p { color: var(--muted); font-size: 0.9rem; }
  .error-state { grid-column: 1/-1; text-align: center; padding: 60px 24px; }
  .error-state h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: #c97b4c; margin-bottom: 8px; }
  .error-state p { color: var(--muted); font-size: 0.85rem; line-height: 1.6; }
  .error-state code { background: var(--card); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }
  .empty { grid-column: 1/-1; text-align: center; padding: 80px 24px; color: var(--muted); }
  .empty h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; margin-bottom: 8px; color: var(--text); }

  /* Badge colors */
  .badge-whisky { background: #3d2a0a; color: #e8b66a; }
  .badge-pisco { background: #2a1a0d; color: #d4916b; }
  .badge-vino { background: #2a0d1a; color: #d46b9b; }
  .badge-vodka { background: #0d1a2a; color: #6ba0d4; }
  .badge-ron { background: #0d2a1a; color: #6bd49b; }
  .badge-gin { background: #1a2a0d; color: #a0d46b; }
  .badge-cerveza { background: #2a200d; color: #d4c06b; }
  .badge-espumante { background: #1a0d2a; color: #b06bd4; }
  .badge-tequila { background: #2a0d0d; color: #d46b6b; }
  .badge-brandy { background: #1a1a0d; color: #b4b46b; }
  .badge-promo { background: #0d2a2a; color: #6bd4d4; }
  .badge-zero { background: #0d1a0d; color: #6bd46b; }
  .badge-otros { background: #1a1a1a; color: #888; }

  footer { text-align: center; padding: 28px; color: var(--muted); font-size: 0.75rem; border-top: 1px solid var(--border); margin-top: 24px; }
  /* BANNER PORTADA */
  .portada {
    background: linear-gradient(160deg, #111 0%, #1a1508 60%, #0d0d0d 100%);
    border-bottom: 1px solid var(--border);
    padding: 36px 24px 28px;
    text-align: center;
  }
  .portada-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--gold);
    font-weight: 700;
    letter-spacing: 0.08em;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .portada-sub {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .portada-logo { height: 110px; width: auto; display: block; margin: 0 auto 24px; }
  .portada-links {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .portada-btn {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 11px 20px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    text-decoration: none;
    transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
    border: 1px solid transparent;
  }
  .portada-btn:hover { transform: translateY(-3px); opacity: 0.92; box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
  .portada-btn svg { flex-shrink: 0; }
  .btn-rappi  { background: #ff441f; color: #fff; border-color: #ff6644; }
  .btn-instagram { background: linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); color: #fff; }
  .btn-facebook  { background: #1877f2; color: #fff; border-color: #3a8ef5; }
  .btn-whatsapp  { background: #25d366; color: #fff; border-color: #1ebe5d; }
  .portada-btn.btn-whatsapp { flex: 0 0 auto; min-width: unset; }

</style>
</head>

        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.557 4.12 1.527 5.852L0 24l6.338-1.5A11.938 11.938 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.007-1.374l-.36-.213-3.727.881.938-3.618-.234-.373A9.818 9.818 0 1112 21.818z"/></svg>
        Enviar por WhatsApp
      </button>
    </div>
    <button class="btn-close" onclick="closeModal()">Cerrar</button>
  </div>
</div>

<div class="copied-toast" id="copiedToast">Texto copiado</div>

<script>
// ============================================================
//  CONFIGURACIÓN
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbziTMvAgu_u680yykwtNHxXPuuLB2atkKgLzc5vDzM4OByb9Z0uBod1rWE8DAcogbQC/exec';

// ↓↓↓ REEMPLAZA CON EL NÚMERO WHATSAPP DE LA BOTILLERÍA (con código de país, sin +) ↓↓↓
const WHATSAPP_NUMBER = '56927956551';
// ============================================================

const CATEGORIES = ['Todos','Whisky','Pisco','Vino','Vodka','Ron','Gin','Cerveza','Espumante','Tequila','Brandy','Barra Zero','Promociones','Otros'];
let activeCategory = 'Todos';
let allProducts = [];
let cart = {}; // { nombre: { producto, qty } }

// ---- Filtros ----
const filterBtnsEl = document.getElementById('filterBtns');
CATEGORIES.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (cat === 'Todos' ? ' active' : '');
  btn.textContent = cat;
  btn.onclick = () => {
    activeCategory = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  filterBtnsEl.appendChild(btn);
});

function badgeClass(cat) {
  const map = { Whisky:'badge-whisky', Pisco:'badge-pisco', Vino:'badge-vino', Vodka:'badge-vodka', Ron:'badge-ron', Gin:'badge-gin', Cerveza:'badge-cerveza', Espumante:'badge-espumante', Tequila:'badge-tequila', Brandy:'badge-brandy', Promociones:'badge-promo', 'Barra Zero':'badge-zero' };
  return map[cat] || 'badge-otros';
}

function fmtPrice(p) {
  return '$' + Number(p).toLocaleString('es-CL');
}

// ---- CARRITO ----
function cartKey(p) { return p.nombre; }

function addToCart(p) {
  const k = cartKey(p);
  if (cart[k]) {
    cart[k].qty++;
  } else {
    cart[k] = { producto: p, qty: 1 };
  }
  updateCartBar();
  render();
}

function changeQty(nombre, delta) {
  if (!cart[nombre]) return;
  cart[nombre].qty += delta;
  if (cart[nombre].qty <= 0) delete cart[nombre];
  updateCartBar();
  render();
}

function clearCart() {
  cart = {};
  updateCartBar();
  render();
}

function cartItems() { return Object.values(cart); }

function cartTotal() {
  return cartItems().reduce((sum, item) => {
    return item.producto.esPromo ? sum : sum + item.producto.precio * item.qty;
  }, 0);
}

function cartCount() {
  return cartItems().reduce((sum, item) => sum + item.qty, 0);
}

function updateCartBar() {
  const bar = document.getElementById('cartBar');
  const items = cartItems();
  if (items.length === 0) {
    bar.classList.remove('visible');
    return;
  }
  bar.classList.add('visible');
  const count = cartCount();
  const total = cartTotal();
  const hasPromos = items.some(i => i.producto.esPromo);
  document.getElementById('cartItemsLabel').textContent =
    count + (count === 1 ? ' producto seleccionado' : ' productos seleccionados');
  document.getElementById('cartTotal').textContent =
    fmtPrice(total) + (hasPromos ? ' + promos' : '');
}

// ---- RENDER ----
function render() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const sort = document.getElementById('sortSelect').value;

  let items = allProducts.filter(p => {
    const catMatch = activeCategory === 'Todos' || p.categoria === activeCategory;
    const qMatch = !q || p.nombre.toLowerCase().includes(q);
    return catMatch && qMatch;
  });

  items.sort((a, b) => {
    if (sort === 'nombre') return a.nombre.localeCompare(b.nombre);
    if (sort === 'precio-asc') return a.precio - b.precio;
    if (sort === 'precio-desc') return b.precio - a.precio;
    if (sort === 'stock') return b.stock - a.stock;
    return 0;
  });

  document.getElementById('countDisplay').textContent = items.length;
  document.getElementById('resultInfo').textContent =
    items.length === allProducts.length
      ? `Mostrando ${items.length} productos`
      : `${items.length} de ${allProducts.length} productos`;

  const grid = document.getElementById('grid');

  if (items.length === 0) {
    grid.innerHTML = `<div class="empty"><h3>Sin resultados</h3><p>No hay productos que coincidan.</p></div>`;
    return;
  }

  grid.innerHTML = items.map((p, i) => {
    const k = cartKey(p);
    const inCart = !!cart[k];
    const qty = inCart ? cart[k].qty : 0;

    const stockTag = p.esPromo
      ? `<div class="stock-tag promo">Consultar disponibilidad</div>`
      : `<div class="stock-tag ${p.stock <= 3 ? 'low' : ''}">${p.stock <= 3 ? '⚠ ' : ''}Stock: ${p.stock}</div>`;

    const cartControls = inCart
      ? `<div class="card-cart">
           <button class="qty-btn" onclick="event.stopPropagation();changeQty('${k.replace(/'/g,"\\'")}', -1)">−</button>
           <span class="qty-display">${qty}</span>
           <button class="qty-btn" onclick="event.stopPropagation();changeQty('${k.replace(/'/g,"\\'")}', 1)">+</button>
         </div>`
      : `<div class="card-cart">
           <button class="add-btn" onclick="event.stopPropagation();addToCart(allProducts[${allProducts.indexOf(p)}])">+ Agregar</button>
         </div>`;

    return `
      <div class="card ${inCart ? 'in-cart' : ''}" style="animation-delay:${Math.min(i,30)*0.02}s" onclick="handleCardClick('${k.replace(/'/g,"\\'")}', ${allProducts.indexOf(p)})">
        <div class="card-top">
          <div class="card-name">${p.nombre}</div>
          <span class="badge ${badgeClass(p.categoria)}">${p.categoria}</span>
        </div>
        <div class="card-bottom">
          <div class="price">${fmtPrice(p.precio)}</div>
          ${stockTag}
        </div>
        ${cartControls}
      </div>`;
  }).join('');
}

function handleCardClick(k, idx) {
  if (!cart[k]) {
    addToCart(allProducts[idx]);
  }
}

// ---- MODAL ----
function openModal() {
  const items = cartItems();
  if (items.length === 0) return;

  const list = document.getElementById('orderList');
  list.innerHTML = items.map(item => {
    const subtotal = item.producto.esPromo ? null : item.producto.precio * item.qty;
    return `<li class="order-item">
      <span class="order-item-name">${item.producto.nombre}</span>
      <span class="order-item-qty">× ${item.qty}</span>
      <span class="order-item-price">${subtotal !== null ? fmtPrice(subtotal) : 'Consultar'}</span>
    </li>`;
  }).join('');

  const total = cartTotal();
  const hasPromos = items.some(i => i.producto.esPromo);
  document.getElementById('modalTotal').textContent = fmtPrice(total) + (hasPromos ? ' + promos a consultar' : '');

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ---- GENERAR TEXTO DEL PEDIDO ----
function buildOrderText() {
  const items = cartItems();
  const total = cartTotal();
  const hasPromos = items.some(i => i.producto.esPromo);

  let lines = ['Hola! Quisiera hacer el siguiente pedido:', ''];
  items.forEach(item => {
    const subtotal = item.producto.esPromo
      ? '(consultar precio)'
      : fmtPrice(item.producto.precio * item.qty);
    lines.push(`• ${item.qty}x ${item.producto.nombre} — ${subtotal}`);
  });
  lines.push('');
  lines.push('Total estimado: ' + fmtPrice(total) + (hasPromos ? ' + promos a consultar' : ''));
  lines.push('');
  lines.push('¿Pueden confirmar disponibilidad? Paso a retirar.');
  return lines.join('\n');
}

function copyOrder() {
  const text = buildOrderText();
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('copiedToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const toast = document.getElementById('copiedToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  });
}

function sendWhatsApp() {
  const text = buildOrderText();
  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

// ---- CARGA DE PRODUCTOS ----
async function loadProducts() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allProducts = data.products || [];
    if (data.updated) {
      document.getElementById('updatedTag').textContent = 'Actualizado: ' + data.updated;
    }
    render();
  } catch (err) {
    document.getElementById('grid').innerHTML = `
      <div class="error-state">
        <h3>Error al cargar</h3>
        <p>No se pudo conectar con la planilla.<br><code>${err.message}</code></p>
      </div>`;
  }
}

loadProducts();
</script>
</body>
</html>
